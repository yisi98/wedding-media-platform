name: CI

# Phase 1: Foundation complete - backend/frontend jobs disabled until Phase 2
# Only security scans run until code exists
# To enable: Remove "if: false" from backend and frontend jobs

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    # Skip until Phase 2 - no backend code yet
    if: false
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false  # Disabled until uv.lock exists (Phase 2)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check dependencies (no install until Phase 2)
        run: |
          echo "⚠️ Skipping dependency install - no backend code yet (Phase 1)"
          echo "Dependencies defined in pyproject.toml are valid"
          uv pip compile pyproject.toml --no-emit-package wedding-media-platform-backend || true

      - name: Lint (ruff)
        run: uv run ruff check .
        continue-on-error: true  # Skip if no Python files yet

      - name: Format check (black)
        run: uv run black --check .
        continue-on-error: true  # Skip if no Python files yet

      - name: Type check (mypy)
        run: uv run mypy app
        continue-on-error: true  # Skip if app/ doesn't exist yet

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-do-not-use-in-prod
        run: |
          if [ -d "app" ] && [ -d "tests" ]; then
            uv run pytest --cov=app --cov-report=xml --cov-report=term
          else
            echo "⚠️ Skipping tests - backend code not yet implemented"
            exit 0
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
        if: always()

  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    # Skip until Phase 2 - no frontend code yet
    if: false
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # cache: npm  # Disabled until package-lock.json exists

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Skip if no source files yet

      - name: Type check
        run: npm run type-check
        continue-on-error: true  # Skip if no TypeScript files yet

      - name: Test
        run: npm test -- --coverage
        continue-on-error: true  # Skip if no tests yet

      - name: Build
        run: npm run build
        continue-on-error: true  # Skip if no Next.js app yet

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
